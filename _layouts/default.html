<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ site.description }}" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet" />

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <!-- Bootstrap CSS (for collapse) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/4.6.2/css/bootstrap.min.css" />

    <!-- Theme & Custom CSS -->
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />

    <!-- jQuery + Bootstrap JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/4.6.2/js/bootstrap.bundle.min.js"></script>
  </head>
  <body>

    <!-- Header -->
    <header class="page-header" role="banner">
      <h1 class="project-name">🤖 {{ site.title }}</h1>
      <h2 class="project-tagline">{{ site.description }}</h2>
      {% if site.github.is_project_page %}
        <a href="{{ site.github.repository_url }}" class="btn">
          <i class="fa-brands fa-github"></i> View on GitHub
        </a>
      {% endif %}
      {% if site.show_downloads %}
        <a href="{{ site.github.zip_url }}" class="btn">Download .zip</a>
        <a href="{{ site.github.tar_url }}" class="btn">Download .tar.gz</a>
      {% endif %}
    </header>

    <!-- Main -->
    <main id="content" class="main-content" role="main">
      {{ content }}
      <footer class="site-footer">
        <span>
          Maintained by <strong>Yaohui Han</strong> &nbsp;|&nbsp;
          <a href="https://github.com/Han-0107/Awesome-LLM-for-EDA" target="_blank">
            <i class="fa-brands fa-github"></i> GitHub
          </a>
          &nbsp;|&nbsp; {{ site.title }} &copy; {{ 'now' | date: "%Y" }}
        </span>
      </footer>
    </main>

  </body>
</html>
